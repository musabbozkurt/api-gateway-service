# This workflow will build a Java project with Maven and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that GitHub does not certify.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    # Skip change detection for workflow_dispatch (manual triggers always build all)
    if: github.event_name != 'workflow_dispatch'
    permissions:
      pull-requests: read
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      openai-service: ${{ steps.filter.outputs.openai-service }}
      payment-service: ${{ steps.filter.outputs.payment-service }}
      service-registry: ${{ steps.filter.outputs.service-registry }}
      student-service: ${{ steps.filter.outputs.student-service }}
      spring-config-server: ${{ steps.filter.outputs.spring-config-server }}
      swagger-application: ${{ steps.filter.outputs.swagger-application }}
      gitlab-service: ${{ steps.filter.outputs.gitlab-service }}
      kafka-debezium-service: ${{ steps.filter.outputs.kafka-debezium-service }}
      brokerage-provider: ${{ steps.filter.outputs.brokerage-provider }}
      stock-exchange-service: ${{ steps.filter.outputs.stock-exchange-service }}
      inventory-management-service: ${{ steps.filter.outputs.inventory-management-service }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Need at least 2 commits to compare HEAD with its parent
          fetch-depth: 2
      - name: Resolve base ref
        id: base
        # Resolve HEAD~1 to an actual SHA — dorny/paths-filter cannot use relative refs like HEAD~1 directly
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Compare only the latest commit (not the entire PR) to detect which services changed
          base: ${{ steps.base.outputs.sha }}
          filters: |
            api-gateway:
              - 'api-gateway/**'
            notification-service:
              - 'notification-service/**'
            openai-service:
              - 'openai-service/**'
            payment-service:
              - 'payment-service/**'
            service-registry:
              - 'service-registry/**'
            student-service:
              - 'student-service/**'
            spring-config-server:
              - 'spring-config-server/**'
            swagger-application:
              - 'swagger-application/**'
            gitlab-service:
              - 'gitlab-service/**'
            kafka-debezium-service:
              - 'kafka-debezium-service/**'
            brokerage-provider:
              - 'brokerage-provider/**'
            stock-exchange-service:
              - 'stock-exchange-service/**'
            inventory-management-service:
              - 'inventory-management-service/**'

  build_api_gateway:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.api-gateway == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build api-gateway with Maven
        run: mvn -B package --file api-gateway/pom.xml

      - name: Start minikube
        uses: medyagh/setup-minikube@master

      - name: Try the cluster !
        run: kubectl get pods -A

      - name: Build image
        run: |
          pwd
          ls -la
          eval $(minikube -p minikube docker-env)
          cd api-gateway/
          pwd
          ls -la
          docker build -t api-gateway .
          echo -n "verifying images:"
          docker images

      - name: Deploy to minikube
        run: |
          pwd
          ls -la
          kubectl apply -f api-gateway/.helm/templates/k8s-api-gateway-app.yaml
          kubectl wait --for=condition=ready pod -l app=api-gateway

      - name: Test service URLs
        run: |
          minikube service list
          SERVICE_URL=$(minikube service api-gateway-service --url)
          HEALTH_URL="$SERVICE_URL/actuator/health"
          echo "Service URL: $SERVICE_URL"
          echo "Health URL: $HEALTH_URL"

  build_notification_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.notification-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build notification-service with Maven
        run: mvn -B package --file notification-service/pom.xml

  build_openai_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.openai-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build openai-service with Maven
        run: mvn -B package --file openai-service/pom.xml

  build_payment_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.payment-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build payment-service with Maven
        run: mvn -B package --file payment-service/pom.xml

  build_service_registry:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.service-registry == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build service-registry with Maven
        run: mvn -B package --file service-registry/pom.xml

  build_student_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.student-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build student-service with Maven
        run: mvn -B package --file student-service/pom.xml

  build_spring_config_server:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.spring-config-server == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build spring-config-server with Maven
        run: mvn -B package --file spring-config-server/pom.xml

  build_swagger_application:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.swagger-application == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    # https://stackoverflow.com/a/70448851
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build swagger-application with Maven
        run: mvn -B package --file swagger-application/pom.xml

  build_gitlab_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.gitlab-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build gitlab-service with Maven
        run: mvn -B package --file gitlab-service/pom.xml

      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: musabbozkurt/github-projects
          tags: gitlab-service-v1, gitlab-service-latest
          registry: docker.io
          directory: gitlab-service
          dockerfile: gitlab-service/Dockerfile
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  build_kafka_debezium_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.kafka-debezium-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build kafka-debezium-service with Maven
        run: mvn -B package --file kafka-debezium-service/pom.xml

      - name: Build and Push Docker Image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: musabbozkurt/github-projects
          tags: kafka-debezium-service-v1, kafka-debezium-service-latest
          registry: docker.io
          directory: kafka-debezium-service
          dockerfile: kafka-debezium-service/Dockerfile
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  build_brokerage_provider:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.brokerage-provider == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build brokerage-provider with Maven
        run: mvn -B package --file brokerage-provider/pom.xml

  build_stock_exchange_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.stock-exchange-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build stock-exchange-service with Maven
        run: mvn -B package --file stock-exchange-service/pom.xml

  build_inventory_management_service:
    needs: detect_changes
    if: always() && (needs.detect_changes.outputs.inventory-management-service == 'true' || needs.detect_changes.result == 'skipped')
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build inventory-management-service with Maven
        run: mvn -B package --file inventory-management-service/pom.xml

  success-job:
    runs-on: ubuntu-latest
    if: ${{ always() && contains(join(needs.*.result, ','), 'success') }}
    needs: [ build_api_gateway, build_notification_service, build_openai_service, build_payment_service, build_service_registry, build_student_service, build_spring_config_server, build_swagger_application, build_gitlab_service, build_kafka_debezium_service, build_brokerage_provider, build_stock_exchange_service, build_inventory_management_service ]
    steps:
      - name: Build is Succeeded
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS"
