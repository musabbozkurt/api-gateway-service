BASE_URL: http://localhost:8080
STUDENT_SERVICE_BASE_URL: lb://student-service
SWAGGER_APPLICATION_BASE_URL: lb://swagger-application
PAYMENT_SERVICE_BASE_URL: lb://payment-service
OPENAI_SERVICE_BASE_URL: lb://openai-service
NOTIFICATION_SERVICE_BASE_URL: lb://notification-service

server:
  port: 8080
  netty:
    idle-timeout: 10s
    connection-timeout: 10s

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 10000
            response-timeout: 10s
            pool:
              max-idle-time: 5s
          default-filters:
            - StripPrefix=1
            - name: CacheRequestBody
              args:
                bodyClass: java.lang.String
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 40
                redis-rate-limiter.burstCapacity: 80
                redis-rate-limiter.requestedTokens: 1
          routes:
            - id: student-service
              predicates:
                - Path=/student/**
              uri: ${STUDENT_SERVICE_BASE_URL}
            - id: swagger-application
              predicates:
                - Path=/swagger/**
              uri: ${SWAGGER_APPLICATION_BASE_URL}
            - id: payment-service
              predicates:
                - Path=/payment/**
              uri: ${PAYMENT_SERVICE_BASE_URL}
            - id: validate
              predicates:
                - Path=/student/**
              uri: ${STUDENT_SERVICE_BASE_URL}
            - id: openai-service
              predicates:
                - Path=/openai/**
              uri: ${OPENAI_SERVICE_BASE_URL}
            - id: notification-service-sse
              predicates:
                - Path=/notification/api/v1/notifications/stream/**
              uri: ${NOTIFICATION_SERVICE_BASE_URL}
              metadata:
                response-timeout: -1
                connect-timeout: 10000
            - id: notification-service
              predicates:
                - Path=/notification/**
              uri: ${NOTIFICATION_SERVICE_BASE_URL}
            - id: role # This can be removed it's just a PrefixPath example.
              predicates:
                - Path=/student/role/**
              uri: ${STUDENT_SERVICE_BASE_URL}
              filters:
                - PrefixPath=/students
  main:
    web-application-type: reactive

  docker:
    compose:
      enabled: false

  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  http:
    codecs:
      max-in-memory-size: 10MB
  reactor:
    context-propagation: auto

google:
  recaptcha:
    url: https://www.google.com/recaptcha/api/siteverify
    key:
      site: ${SITE_KEY} # SITE KEY
      secret: ${SECRET_KEY} # SECRET KEY
      threshold: 0.5

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, prometheus
  tracing:
    sampling:
      probability: 1.0 # 1.0 means 100% of requests are traced, adjust as needed for production
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_URL:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_LOGS_URL:http://localhost:4318/v1/logs}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # http://localhost:8080/swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - url: /openai/api-docs
        name: OpenAI Service
        uri: ${OPENAI_SERVICE_BASE_URL}
        server-url: ${BASE_URL}/openai
      - url: /payment/api-docs
        name: Payment Service
        uri: ${PAYMENT_SERVICE_BASE_URL}
        server-url: ${BASE_URL}/payment
      - url: /student/api-docs
        name: Student Service
        uri: ${STUDENT_SERVICE_BASE_URL}
        server-url: ${BASE_URL}/student
      - url: /notification/api-docs
        name: Notification Service
        uri: ${NOTIFICATION_SERVICE_BASE_URL}
        server-url: ${BASE_URL}/notification
      - url: /swagger/api-docs
        name: Swagger Service
        uri: ${SWAGGER_APPLICATION_BASE_URL}
        server-url: ${BASE_URL}/swagger

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}

logging:
  level:
    com.mb.apigateway.config: INFO
    com.mb.apigateway.filter: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.http.server.reactive: INFO
    org.springframework.web.reactive: INFO
    reactor.netty: INFO
    reactor.netty.http.client: INFO
  request:
    enabled: true
    includeRequestBody: true
    includeResponseBody: true
    maxBodySize: 10000
    excludePaths:
      - "/actuator/**"
    excludeContentTypes:
      - "multipart/form-data"

secure-service:
  introspection-uri: ${INTROSPECTION_URI:http://localhost:8081/auth/realms/mb-realm/protocol/openid-connect/token/introspect}

gateway-service:
  client-id: ${CLIENT_ID:gateway-service}
  client-secret: ${CLIENT_SECRET:gateway-secret}
  security:
    permitted-paths:
      - /actuator/health
      - /content-service/**
      - /rbac-service/api/v1/forgot-password/generate-code
      - /rbac-service/api/v1/forgot-password/validate-code
      - /rbac-service/api/v1/forgot-password/change
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v3/api-docs
      - /webjars/**
      - /openai/api-docs
      - /payment/api-docs
      - /student/api-docs
      - /notification/api-docs
      - /swagger/api-docs
      - /** # This allows all paths to be accessed without authentication, it will be removed in production
