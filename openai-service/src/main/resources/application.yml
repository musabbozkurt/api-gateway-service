GATEWAY_BASE_URL: ${GATEWAY_BASE_URL_ENV:http://localhost:8080}

spring:
  application:
    name: openai-service

  config:
    import: optional:file:.env[.properties]

  main:
    allow-bean-definition-overriding: true

feign:
  services:
    openai-client:
      url: https://api.openai.com/v1
      token: ${YOUR_API_KEY_HERE}

springdoc:
  api-docs:
    path: /openai/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_URL:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_LOGS_URL:http://localhost:4318/v1/logs}
