services:

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080" # Map host port 8080 to container port 8080
    depends_on:
      gitlab-service:
        condition: service_started
      grafana-lgtm:
        condition: service_started
      inventory-management-service:
        condition: service_started
      kafka-debezium-service:
        condition: service_started
      keycloak:
        condition: service_started
      notification-service:
        condition: service_started
      openai-service:
        condition: service_started
      payment-service:
        condition: service_started
      redis-insight-service:
        condition: service_started
      redis-service:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
      student-service:
        condition: service_started
      stock-exchange-service:
        condition: service_started
      swagger-application:
        condition: service_started
      zipkin:
        condition: service_started
    environment:
      CLIENT_ID: ${GATEWAY_CLIENT_ID:-api-gateway-client}
      CLIENT_SECRET: ${GATEWAY_CLIENT_SECRET:-m5CxL5t54ACk17mDjp0Zje0jBBRsXJuM}
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      INTROSPECTION_URI: http://keycloak:9090/realms/${KEYCLOAK_REALM:-mb-realm}/protocol/openid-connect/token/introspect
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
      REDIS_HOST: redis-service
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8081:8081" # Map host port 8081 to container port 8080
    depends_on:
      grafana-lgtm:
        condition: service_started
      keycloak:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      GATEWAY_BASE_URL_ENV: http://api-gateway:8080
      KEYCLOAK_BASE_URL: http://keycloak:9090
      KEYCLOAK_CLIENT_ID_ENV: api-gateway-client
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  swagger-application:
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    build:
      context: ./swagger-application
      dockerfile: Dockerfile
    ports:
      - "8082:8082" # Map host port 8082 to container port 8080
    depends_on:
      grafana-lgtm:
        condition: service_started
      kafka: # Bus must be available to receive RefreshRemoteApplicationEvents from the config server
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI: http://spring-config-server:8888
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092 # Internal Docker listener — used by Spring Cloud Bus (Kafka) for receiving refresh events
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083" # Map host port 8083 to container port 8080
    depends_on:
      grafana-lgtm:
        condition: service_started
      keycloak:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      KEYCLOAK_BASE_URL_ENV: http://keycloak:9090
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  openai-service:
    build:
      context: ./openai-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084" # Map host port 8084 to container port 8080
    depends_on:
      grafana-lgtm:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    depends_on:
      grafana-lgtm:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
      mailpit:
        condition: service_started
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI: http://spring-config-server:8888
      DB_HOST: postgres
      DB_PORT: 5432
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_BASE_URL: http://keycloak:9090
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    ports:
      - "8761:8761" # Map host port 8761 to container port 8761
    depends_on:
      grafana-lgtm:
        condition: service_started
    environment:
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  spring-config-server:
    build:
      context: ./spring-config-server
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8888:8888" # Map host port 8888 to container port 8888
    depends_on:
      - grafana-lgtm
      - kafka # Bus must be available so ConfigChangeWatcher can publish RefreshRemoteApplicationEvents
      - service-registry
    environment:
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092 # Internal Docker listener — used by Spring Cloud Bus (Kafka) for broadcasting refresh events
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  rabbitmq:
    image: rabbitmq:4.2.4
    restart: on-failure
    container_name: test-rabbitmq
    ports:
      - "5673:5672" # default ports 5672:5672
      - "15673:15672" # default ports 15672:15672
      # environment:
      # RABBITMQ_DEFAULT_USER: guest error: RABBITMQ_DEFAULT_USER is set but deprecated
      # RABBITMQ_DEFAULT_PASS: guest error: RABBITMQ_DEFAULT_PASS is set but deprecated
    networks:
      - mb-network

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1                                                                                            # Unique numeric ID for this Kafka node in the KRaft cluster
      KAFKA_PROCESS_ROLES: 'broker,controller'                                                                    # Run this node as both a broker (handles clients) and a controller (manages metadata) — no ZooKeeper needed
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'                                                             # List of controller voters in the quorum; format is <node_id>@<host>:<port>
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'           # Internal listeners: PLAINTEXT for inter-broker, CONTROLLER for KRaft, PLAINTEXT_HOST for external clients
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'                       # Addresses advertised to clients; PLAINTEXT for within Docker network, PLAINTEXT_HOST for host machine access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'   # Maps each listener name to its security protocol (all unencrypted PLAINTEXT here)
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'                                                               # Which listener brokers use to communicate with each other inside the Docker network
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'                                                               # Which listener name is designated for KRaft controller-to-controller and broker-to-controller traffic
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1                                                                   # Replication factor for the internal __consumer_offsets topic; set to 1 for a single-node setup
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0                                                                   # Delay before the first consumer group rebalance; 0 speeds up startup in dev environments
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1                                                                      # Minimum in-sync replicas for the transaction state log; set to 1 for single-node
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1                                                           # Replication factor for the internal transaction state log topic; set to 1 for single-node
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'                                                                        # Pre-generated base64-encoded UUID that uniquely identifies this KRaft cluster; required on first startup
    networks:
      - mb-network
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "9999:8080"                                                                                               # Kafka UI dashboard accessible at http://localhost:9999
    depends_on:
      - kafka                                                                                                     # Ensure Kafka broker is up before starting the UI
    environment:
      DYNAMIC_CONFIG_ENABLED: true                                                                                # Allows clusters to be added/edited at runtime via the UI
      KAFKA_CLUSTERS_0_NAME: local                                                                                # Display name for the main cluster in the UI
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092                                                              # Main Kafka broker (notification-service, spring-config-server, swagger-application)
      KAFKA_CLUSTERS_1_NAME: debezium-local                                                                       # Display name for the Debezium cluster in the UI
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: debezium-kafka1:29092,debezium-kafka2:29092,debezium-kafka3:29092        # Debezium 3-node Kafka cluster
    networks:
      - mb-network
    restart: on-failure

  postgres:
    image: postgres:18.3
    restart: on-failure
    container_name: postgres-db
    ports:
      - "5433:5432" # default ports 5432:5432
    environment:
      POSTGRES_DB: ${POSTGRESQL_DB}
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASS}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER} -d ${POSTGRESQL_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mb-network
    volumes:
      # PostgreSQL 18+ stores data under a major-version subdirectory (e.g., /var/lib/postgresql/18/main).
      # Mounting at /var/lib/postgresql (without /data) lets the image manage the subdirectory itself
      # and avoids the "data in unused mount/volume" error introduced in postgres:18+.
      # If upgrading from a postgres:16/17 image, remove the old volume first:
      # docker compose down -v && docker volume rm <project>_postgres_data
      - postgres_data:/var/lib/postgresql

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: true
      KC_HTTP_PORT: 9090
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/${POSTGRESQL_DB}
      KC_DB_USERNAME: ${POSTGRESQL_USER}
      KC_DB_PASSWORD: ${POSTGRESQL_PASS}
    ports:
      - "127.0.0.1:9090:9090"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  redis-service:
    image: redis:8.6.1
    container_name: redis-service
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: on-failure
    networks:
      - mb-network

  redis-insight-service:
    image: redis/redisinsight:latest
    restart: on-failure
    container_name: redis-insight-service
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data
    networks:
      - mb-network

  # Note: openzipkin/zipkin-slim is mirrored as ghcr.io/openzipkin/zipkin-slim
  # The zipkin process services the UI and also exposes a POST endpoint that
  # instrumentation can send trace data to.
  zipkin:
    image: ghcr.io/openzipkin/zipkin-slim:master
    container_name: zipkin
    # Environment settings are defined here https://github.com/openzipkin/zipkin/blob/master/zipkin-server/README.md#environment-variables
    environment:
      - STORAGE_TYPE=mem
      # Uncomment to enable self-tracing
      # - SELF_TRACING_ENABLED=true
      # Uncomment to increase heap size
      # - JAVA_OPTS=-Xms128m -Xmx128m -XX:+ExitOnOutOfMemoryError
    ports:
      # Port used for the Zipkin UI and HTTP Api
      - "9411:9411"
    # Uncomment to enable debug logging
    # command: --logging.level.zipkin2=DEBUG
    networks:
      - mb-network
    restart: on-failure

  grafana-lgtm:
    image: 'grafana/otel-lgtm:0.26.0'
    ports:
      - "3001:3000"   # Grafana UI
      - "4318:4318"   # OTLP HTTP receiver
      - "4317:4317"   # OTLP gRPC receiver
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - mb-network
    restart: on-failure

  prometheus:
    image: "prom/prometheus"
    restart: on-failure
    ports:
      - "9091:9090"
    volumes:
      - ./brokerage-provider/src/main/resources/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command: --web.enable-lifecycle --config.file=/etc/prometheus/prometheus.yml
    container_name: prometheus
    networks:
      - mb-network

  mailpit:
    image: axllent/mailpit:v1.29.2
    container_name: mailpit
    restart: on-failure
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI (http://localhost:8025)
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=false
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
      - MP_SMTP_REQUIRE_STARTTLS=false
      - MP_SMTP_REQUIRE_TLS=false
      - MP_UI_AUTH=admin:admin
      - MP_SMTP_AUTH=admin:admin
    networks:
      - mb-network

  # ========================================================================================
  # gitlab-service (standalone — Feign Client for bulk Gitlab operations)
  # ========================================================================================

  gitlab-service:
    build:
      context: ./gitlab-service
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    environment:
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      GITLAB_API_URL: ${GITLAB_API_URL:-https://gitlab.com/api/v4}
      GITLAB_PRIVATE_TOKEN: ${GITLAB_PRIVATE_TOKEN:-}
      GITLAB_URL_PATH_WITH_NAMESPACE: ${GITLAB_URL_PATH_WITH_NAMESPACE:-}
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    depends_on:
      grafana-lgtm:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  # ========================================================================================
  # brokerage-provider
  # ========================================================================================

  brokerage-provider:
    build:
      context: ./brokerage-provider
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    depends_on:
      grafana-lgtm:
        condition: service_started
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRESQL_DB}
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASS}
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PRODUCER_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  # ========================================================================================
  # stock-exchange-service
  # ========================================================================================

  stock-exchange-service:
    build:
      context: ./stock-exchange-service
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    depends_on:
      grafana-lgtm:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis-service:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRESQL_DB}
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASS}
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      REDIS_HOST: redis-service
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PRODUCER_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  # ========================================================================================
  # inventory-management-service
  # ========================================================================================

  inventory-management-service:
    build:
      context: ./inventory-management-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      grafana-lgtm:
        condition: service_started
      postgres:
        condition: service_healthy
      redis-service:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRESQL_DB}
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASS}
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      REDIS_HOST: redis-service
      REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

  # ========================================================================================
  # kafka-debezium-service (CDC with Debezium, Kafka cluster, PostgreSQL, and Oracle)
  # ========================================================================================

  debezium-postgres:
    image: postgres:18
    container_name: debezium-postgres
    restart: on-failure
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    volumes:
      - ./kafka-debezium-service/scripts/postgres:/docker-entrypoint-initdb.d
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  oracle-db:
    image: gvenzl/oracle-free:23.8
    container_name: oracle-db
    restart: on-failure
    ports:
      - "1522:1521"
    environment:
      - ORACLE_ARCHIVELOG=true
      - APP_USER=MB_ORACLE_USER
      - APP_USER_PASSWORD=oracle_password
      - ORACLE_PASSWORD=oracle_password
      - ORACLE_CHARACTERSET=AL32UTF8
    volumes:
      - ./kafka-debezium-service/scripts/oracle:/container-entrypoint-startdb.d
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  oracle-db-19:
    image: ${ORACLE_CONTAINER_REGISTRY_URL:-container-registry.oracle.com/database/enterprise:19.3.0.0}
    container_name: oracle-db-19
    restart: on-failure
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PWD=oracle_19_password
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./kafka-debezium-service/scripts/oracle-19:/docker-entrypoint-initdb.d
    profiles:
      - debezium-oracle-19
    networks:
      - mb-network

  debezium-kafka1:
    image: confluentinc/cp-kafka:8.2.0
    hostname: debezium-kafka1
    container_name: debezium-kafka1
    restart: on-failure
    ports:
      - "19092:19092"
      - "19093:19093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@debezium-kafka1:19093,2@debezium-kafka2:19093,3@debezium-kafka3:19093'
      KAFKA_LISTENERS: 'PLAINTEXT://debezium-kafka1:29092,EXTERNAL://0.0.0.0:19092,CONTROLLER://debezium-kafka1:19093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://debezium-kafka1:29092,EXTERNAL://localhost:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'Y_K8U2FuTtqok5Zpyp3ltA'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - debezium-kafka1-data:/var/lib/kafka/data
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  debezium-kafka2:
    image: confluentinc/cp-kafka:8.2.0
    hostname: debezium-kafka2
    container_name: debezium-kafka2
    restart: on-failure
    ports:
      - "19094:19094"
      - "19095:19093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@debezium-kafka1:19093,2@debezium-kafka2:19093,3@debezium-kafka3:19093'
      KAFKA_LISTENERS: 'PLAINTEXT://debezium-kafka2:29092,EXTERNAL://0.0.0.0:19094,CONTROLLER://debezium-kafka2:19093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://debezium-kafka2:29092,EXTERNAL://localhost:19094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'Y_K8U2FuTtqok5Zpyp3ltA'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - debezium-kafka2-data:/var/lib/kafka/data
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  debezium-kafka3:
    image: confluentinc/cp-kafka:8.2.0
    hostname: debezium-kafka3
    container_name: debezium-kafka3
    restart: on-failure
    ports:
      - "19096:19096"
      - "19097:19093"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@debezium-kafka1:19093,2@debezium-kafka2:19093,3@debezium-kafka3:19093'
      KAFKA_LISTENERS: 'PLAINTEXT://debezium-kafka3:29092,EXTERNAL://0.0.0.0:19096,CONTROLLER://debezium-kafka3:19093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://debezium-kafka3:29092,EXTERNAL://localhost:19096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'Y_K8U2FuTtqok5Zpyp3ltA'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    volumes:
      - debezium-kafka3-data:/var/lib/kafka/data
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  debezium-connector:
    image: debezium/connect:3.0.0.Final
    hostname: debezium-connector
    container_name: debezium-connector
    restart: on-failure
    ports:
      - "8087:8083"
    environment:
      BOOTSTRAP_SERVERS: debezium-kafka1:29092,debezium-kafka2:29092,debezium-kafka3:29092
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    depends_on:
      debezium-kafka1:
        condition: service_started
      debezium-kafka2:
        condition: service_started
      debezium-kafka3:
        condition: service_started
      debezium-postgres:
        condition: service_healthy
      oracle-db:
        condition: service_started
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  debezium-init:
    image: curlimages/curl:8.20.0
    container_name: debezium-init
    depends_on:
      debezium-connector:
        condition: service_started
      oracle-db:
        condition: service_started
    volumes:
      - ./kafka-debezium-service/scripts/register-connectors.sh:/register-connectors.sh:ro
    entrypoint: [ "sh", "/register-connectors.sh" ]
    restart: "no"
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network

  kafka-debezium-service:
    build:
      context: ./kafka-debezium-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      EUREKA_CLIENT_SERVICE_URL: http://service-registry:8761/eureka
      KAFKA_CONSUMER_BOOTSTRAP_SERVERS: debezium-kafka1:29092,debezium-kafka2:29092,debezium-kafka3:29092
      KAFKA_PRODUCER_BOOTSTRAP_SERVERS: debezium-kafka1:29092,debezium-kafka2:29092,debezium-kafka3:29092
      OTEL_EXPORTER_OTLP_LOGS_URL: http://grafana-lgtm:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_URL: http://grafana-lgtm:4318/v1/metrics
      OTEL_EXPORTER_OTLP_TRACES_URL: http://grafana-lgtm:4318/v1/traces
    depends_on:
      debezium-connector:
        condition: service_started
      debezium-kafka1:
        condition: service_started
      debezium-kafka2:
        condition: service_started
      debezium-kafka3:
        condition: service_started
      grafana-lgtm:
        condition: service_started
      service-registry:
        condition: service_started
      spring-config-server:
        condition: service_healthy
    profiles:
      - ${SERVICE_START_PROFILE}
    networks:
      - mb-network
    restart: on-failure

volumes:
  redis-data:
  redis-insight:
  postgres_data:
  oracle-data:
  debezium-kafka1-data:
  debezium-kafka2-data:
  debezium-kafka3-data:

networks:
  mb-network:
    driver: bridge
