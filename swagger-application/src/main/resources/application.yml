GATEWAY_BASE_URL: ${GATEWAY_BASE_URL_ENV:http://localhost:8080}

spring:
  application:
    name: swagger-application

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ${H2_PASSWORD:sa}
    driverClassName: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    virtual-host: /
    connection-timeout: 0
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-retries: 2
        max-interval: 3000
        multiplier: 1

  cloud:
    function:
      definition: studentConsumer
    # BusFunctionInitializer auto-appends ";springCloudBus" at runtime — do NOT add it manually.
    # When default-binder is kafka, the Bus bindings automatically use Kafka to match the config server.
    # This makes the queue durable so that if the application is down, the messages would still be published.
    # These are then processed once the application is up again.
    # Instruction defines exchange and queue names
    # Dead Letter queue is created automatically and bound to main instruction queue.
    stream:
      # Default binder for ALL bindings — Spring Cloud Bus auto-creates springCloudBus-in-0/out-0,
      # and they inherit this default, so they connect to the same Kafka transport as the config server.
      # Application-level bindings override this with explicit "binder: rabbit" below.
      default-binder: kafka
      bindings:
        swaggerProducer-out-0:
          destination: swagger_events_destination
          group: swagger_events_group
          binder: rabbit # Override default: application events go through RabbitMQ, not Kafka
        studentConsumer-in-0:
          destination: student_events_destination
          group: student_events_group
          binder: rabbit # Override default: application events go through RabbitMQ, not Kafka
          consumer:
            maxAttempts: 1
            concurrency: 1
      # springCloudBus-in-0 and springCloudBus-out-0 are auto-created by Bus auto-config.
      # They inherit default-binder: kafka — no explicit binder override needed.
      kafka:
        binder:
          # Kafka broker address — used by Spring Cloud Bus bindings (the default binder).
          # Overridden to kafka:29092 inside Docker via the KAFKA_BOOTSTRAP_SERVERS environment variable.
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      rabbit:
        bindings:
          studentConsumer-in-0:
            consumer:
              exchangeType: fanout
              auto-bind-dlq: true
              requeueRejected: false
              republish-to-dlq: true
              dlq-dead-letter-exchange:
              dlq-ttl: 300000
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      profile: development
      label: main
      fail-fast: true # true: if config server is down, this service will not start
    bus:
      destination: springCloudBus # Kafka topic shared with config server for RefreshRemoteApplicationEvents

  config:
    import: "optional:configserver:" # "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

management:
  tracing:
    sampling:
      probability: 1.0
  observations:
    key-values:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        # POST /actuator/refresh      — refreshes @RefreshScope beans on THIS instance only
        # POST /actuator/busrefresh   — broadcasts refresh to ALL instances via Spring Cloud Bus (Kafka)
        include: refresh,busrefresh,health,info # curl --location --request POST 'http://localhost:8082/actuator/refresh', curl --location --request POST 'http://localhost:8082/actuator/busrefresh'

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

server:
  port: 8082

springdoc:
  api-docs:
    path: /swagger/api-docs
  swagger-ui:
    path: /swagger-ui.html # http://localhost:8082/swagger-ui/index.html
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}
