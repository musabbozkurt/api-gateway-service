GATEWAY_BASE_URL: ${GATEWAY_BASE_URL_ENV:http://localhost:8080}
KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL_ENV:http://localhost:9090}
KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL_ENV:http://localhost:9090} # Browser-accessible Keycloak URL used by Swagger UI OAuth flows (must be reachable from the user's browser, not the Docker internal network)
KEYCLOAK_REALM: ${KEYCLOAK_REALM_ENV:mb-realm}

spring:
  application:
    name: payment-service

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/postgres?currentSchema=payment_schema
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: payment_schema
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-version: 0
    baseline-on-migrate: true
    schemas: payment_schema
    table: schema_version
    validate-on-migrate: false
    locations: ${DB_MIGRATION_LOCATIONS:classpath:db/migration/common,classpath:db/migration/non-prod}

  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: ${KEYCLOAK_EXTERNAL_URL}/realms/${KEYCLOAK_REALM} # Must match JWT "iss" claim (browser-issued tokens use external URL)
          jwk-set-uri: ${KEYCLOAK_BASE_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs # Must be reachable from the service (Docker internal URL)

jwt:
  auth:
    converter:
      principle-attribute: api-gateway-client

server:
  port: 8083

springdoc:
  api-docs:
    path: /payment/api-docs
  swagger-ui:
    path: /swagger-ui.html # http://localhost:8083/swagger-ui/index.html
    csrf:
      enabled: true

  security: # Custom variables
    config:
      password-flow: true
      openid-discovery: false
      auth-code-flow: false
      implicit-flow: false
      bearer: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_URL:http://localhost:4318/v1/traces}
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_LOGS_URL:http://localhost:4318/v1/logs}
