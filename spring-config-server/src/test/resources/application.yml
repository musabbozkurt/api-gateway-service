spring:
  application:
    name: spring-config-server
  profiles:
    active: jdbc

  cloud:
    config:
      server:
        jdbc:
          sql: SELECT PROP_KEY, PROP_VALUE from config_server_schema.properties where APPLICATION=? and PROFILE=? and LABEL=?
          order: 1
          default-label: main
          enabled: true
    bus:
      enabled: true
      destination: springCloudBus

  config:
    import: ""

  datasource:
    # url, username, and password are supplied at runtime by PostgresIntegrationConfiguration via @DynamicPropertySource
    type: com.zaxxer.hikari.HikariDataSource

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: schema_version
    locations: classpath:db/migration/common
    default-schema: config_server_schema

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  main:
    allow-bean-definition-overriding: true
    banner-mode: off

management:
  endpoints:
    web:
      exposure:
        include: busrefresh,health,info
  endpoint:
    health:
      show-details: always
