spring:
  application:
    name: spring-config-server

  profiles:
    active: local,development,production,jdbc

  datasource:
    hikari:
      connection-timeout: '5000'
      maximum-pool-size: '10'
    url: jdbc:h2:mem:testdb
    username: sa
    password: ${H2_PASSWORD:sa}
    driverClassName: org.h2.Driver

  h2:
    console:
      enabled: true # http://localhost:8888/h2-console/
      settings:
        web-allow-others: true # Allow remote connections to H2 console

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: schema_version
    locations: classpath:db/migration/common,classpath:db/migration/non-prod
    default-schema: config_server_schema

  jpa:
    show-sql: true

  cloud:
    config:
      server:
        jdbc:
          enabled: true
          order: 1
          sql: SELECT PROP_KEY, PROP_VALUE from config_server_schema.properties where APPLICATION=? and PROFILE=? and LABEL=?
        git:
          uri: https://github.com/musabbozkurt/api-gateway-service
          search-paths: api-gateway/src/main/resources/config-server
          default-label: main
          order: 2
    stream:
      kafka:
        binder:
          # Kafka broker address — overridden to kafka:29092 inside Docker (see KAFKA_BOOTSTRAP_SERVERS env var)
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    bus:
      # Kafka topic used by Spring Cloud Bus to broadcast RefreshRemoteApplicationEvents
      # Prevent config server from refreshing itself when it broadcasts "**" events to clients.
      # Without this the config server deregisters/re-registers with Eureka on every DB change,
      # creating a 3-second disruption window visible in the logs as "Keys refreshed []".
      destination: springCloudBus
      refresh:
        enabled: false

# ConfigChangeWatcher — polls config_server_schema.properties and auto-broadcasts refresh via Bus
config:
  change-watcher:
    poll-interval-ms: 5000 # How often (ms) to check the DB for changes; default 5 s

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        # POST /actuator/refresh      — refreshes @RefreshScope beans on THIS instance only
        # POST /actuator/busrefresh   — broadcasts refresh to ALL instances via Spring Cloud Bus (Kafka)
        include: refresh,busrefresh,health,info # curl --location --request POST 'http://127.0.0.1:8888/actuator/refresh', curl --location --request POST 'http://127.0.0.1:8888/actuator/busrefresh'

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka}
